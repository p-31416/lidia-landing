<svg 
  viewBox="0 0 100 100" 
  fill="none" 
  xmlns="http://www.w3.org/2000/svg"
>
  {/* Rounded square background with the brand primary color */}
  <rect width="100" height="100" rx="20" fill="#002147"/>
  
  {/* Simplified Tech 'L' Path */}
  <path 
    d="M35 30V70H70" 
    stroke="#00BCE4" 
    stroke-width="12" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  {/* Connection Nodes */}
  <circle cx="35" cy="30" r="8" fill="#00BCE4"/>
  <circle cx="70" cy="70" r="8" fill="#00BCE4"/>
</svg>